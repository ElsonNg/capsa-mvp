<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Capsa - Document Trust Prototype</title>
  <style>
    :root {
      --bg: #f7f9fb;
      --surface: #ffffff;
      --surface-low: #f2f4f6;
      --surface-high: #e6e8ea;
      --ink: #191c1e;
      --ink-soft: #5a4136;
      --line: #e2bfb0;
      --line-soft: #e6e8ea;
      --orange: #ff6b00;
      --orange-dark: #a04100;
      --orange-pale: #fff0e8;
      --red: #ba1a1a;
      --red-pale: #ffdad6;
      --green: #087a53;
      --green-pale: #dff6eb;
      --blue: #0062a1;
      --blue-pale: #d0e4ff;
      --amber: #9b5f00;
      --amber-pale: #fff2cc;
      --shadow: 0 1px 3px rgba(25, 28, 30, 0.06), 0 8px 20px rgba(25, 28, 30, 0.04);
      --modal-shadow: 0 18px 44px rgba(25, 28, 30, 0.18);
      --radius: 8px;
      --sans: "Hanken Grotesk", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --brand: "Nunito Sans", Inter, ui-sans-serif, system-ui, sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-family: var(--sans);
      color: var(--ink);
      background: var(--bg);
      letter-spacing: 0;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background: var(--bg);
      overflow-x: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    tr:focus-visible {
      outline: 3px solid rgba(255, 107, 0, 0.28);
      outline-offset: 2px;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 256px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 20px;
      border-right: 1px solid var(--line);
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 28px;
      z-index: 3;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 28px;
      height: 22px;
      border-radius: 7px;
      background: var(--orange);
      position: relative;
      flex: 0 0 auto;
    }

    .logo-mark:after {
      content: "";
      position: absolute;
      width: 17px;
      height: 6px;
      left: 6px;
      top: 8px;
      border-radius: 999px;
      background: #fff;
      transform: rotate(-15deg);
    }

    .brand-name {
      font-family: var(--brand);
      font-weight: 900;
      font-size: 23px;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .brand-caption {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-soft);
    }

    .nav {
      display: grid;
      gap: 10px;
    }

    .nav-button,
    .top-nav-button,
    .primary-button,
    .secondary-button,
    .tab-button,
    .ghost-button,
    .choice-button {
      border: 0;
      border-radius: var(--radius);
      color: var(--ink);
      background: transparent;
      min-height: 40px;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease, border-color 160ms ease;
    }

    .nav-button {
      width: 100%;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      text-align: left;
      font-weight: 550;
      color: var(--ink-soft);
      position: relative;
    }

    .nav-button:hover {
      background: var(--surface-low);
    }

    .nav-button.active {
      background: var(--orange-pale);
      color: var(--orange-dark);
    }

    .nav-button.active:before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      border-radius: 999px;
      background: var(--orange-dark);
    }

    .glyph {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      font-weight: 600;
      color: currentColor;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: #ffe7d8;
      display: grid;
      place-items: center;
      color: var(--orange-dark);
      font-weight: 600;
      border: 1px solid var(--line);
    }

    .profile-button {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #ffe7d8;
      color: var(--orange-dark);
      display: grid;
      place-items: center;
      font-weight: 600;
      padding: 0;
    }

    .profile-button:hover {
      background: var(--orange-pale);
      border-color: var(--orange-dark);
    }

    .truncate {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .workspace {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      min-height: 72px;
      padding: 14px 40px;
      border-bottom: 1px solid var(--line-soft);
      background: rgba(247, 249, 251, 0.92);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      position: sticky;
      top: 0;
      z-index: 2;
      backdrop-filter: blur(16px);
    }

    .search {
      width: min(360px, 100%);
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      align-items: center;
      padding: 0 12px;
      color: var(--ink-soft);
    }

    .search input {
      border: 0;
      outline: 0;
      background: transparent;
      min-width: 0;
      color: var(--ink);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--ink-soft);
      font-weight: 500;
    }

    .top-nav-button {
      font-weight: 550;
      color: var(--ink-soft);
      padding: 8px 10px;
    }

    .top-nav-button:hover {
      color: var(--orange-dark);
      background: var(--orange-pale);
    }

    .notification-button {
      width: 40px;
      height: 40px;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink-soft);
      display: grid;
      place-items: center;
      position: relative;
      padding: 0;
    }

    .notification-button:hover {
      border-color: var(--line);
      color: var(--orange-dark);
      background: var(--orange-pale);
    }

    .notification-dot {
      position: absolute;
      top: 9px;
      right: 10px;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--orange);
      border: 1px solid #fff;
    }

    .content {
      padding: 40px;
      max-width: 1320px;
      width: 100%;
    }

    .mobile-nav {
      display: none;
      gap: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 72px;
      z-index: 2;
    }

    .mobile-nav .top-nav-button {
      border: 1px solid var(--line-soft);
      white-space: nowrap;
    }

    .mobile-nav .top-nav-button.active {
      background: var(--orange-pale);
      color: var(--orange-dark);
      border-color: var(--line);
    }

    .page-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 32px;
    }

    .crumbs {
      display: flex;
      gap: 10px;
      align-items: center;
      color: var(--ink-soft);
      font-weight: 550;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 40px;
      line-height: 1.05;
      margin: 0;
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    h2,
    h3,
    p {
      margin-top: 0;
    }

    .subcopy {
      color: var(--ink-soft);
      font-size: 17px;
      line-height: 1.45;
      margin: 8px 0 0;
    }

    .primary-button,
    .secondary-button,
    .ghost-button,
    .tab-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 10px 16px;
      font-weight: 600;
      white-space: nowrap;
    }

    .primary-button {
      background: var(--orange-dark);
      color: #fff;
      border: 1px solid var(--orange-dark);
    }

    .primary-button:hover {
      background: var(--orange);
      border-color: var(--orange);
      transform: translateY(-1px);
    }

    .secondary-button {
      background: var(--surface-low);
      color: var(--ink-soft);
      border: 1px solid var(--line-soft);
    }

    .ghost-button {
      background: #fff;
      color: var(--orange-dark);
      border: 1px solid var(--line);
    }

    .icon-control {
      min-width: 110px;
    }

    .control-icon {
      width: 18px;
      height: 18px;
      position: relative;
      display: inline-block;
      flex: 0 0 auto;
    }

    .control-icon.filter:before {
      content: "";
      position: absolute;
      left: 2px;
      top: 3px;
      width: 14px;
      height: 5px;
      border: 2px solid currentColor;
      border-bottom: 0;
      border-radius: 3px 3px 1px 1px;
    }

    .control-icon.filter:after {
      content: "";
      position: absolute;
      left: 6px;
      top: 8px;
      width: 6px;
      height: 7px;
      background: currentColor;
      clip-path: polygon(0 0, 100% 0, 62% 100%, 38% 100%);
    }

    .control-icon.sort:before,
    .control-icon.sort:after {
      content: "";
      position: absolute;
      left: 2px;
      right: 2px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 6px 0 currentColor;
    }

    .control-icon.sort:before {
      top: 3px;
      width: 14px;
    }

    .control-icon.sort:after {
      top: 15px;
      width: 8px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      margin-bottom: 34px;
    }

    .stat-card,
    .card,
    .space-card {
      background: var(--surface);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .stat-card {
      min-height: 110px;
      padding: 22px;
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 18px;
      align-items: center;
    }

    .stat-card.alert {
      border-color: #ffb7ad;
      background: linear-gradient(90deg, #fff, #fff8f7);
    }

    .stat-icon {
      width: 58px;
      height: 58px;
      border-radius: var(--radius);
      background: var(--surface-low);
      display: grid;
      place-items: center;
      color: var(--ink-soft);
      font-weight: 600;
      font-size: 24px;
    }

    .stat-card.alert .stat-icon {
      color: var(--red);
      background: var(--red-pale);
    }

    .stat-card.source .stat-icon {
      color: var(--blue);
      background: var(--blue-pale);
    }

    .label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--ink-soft);
      letter-spacing: 0.02em;
    }

    .stat-value {
      font-size: 30px;
      line-height: 1;
      font-weight: 650;
      margin-top: 6px;
      letter-spacing: -0.03em;
    }

    .alert .label,
    .alert .stat-value {
      color: var(--red);
    }

    .tabs {
      display: flex;
      gap: 28px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 34px;
    }

    .tab-button {
      min-height: 48px;
      padding: 12px 8px;
      border-radius: 0;
      border-bottom: 3px solid transparent;
      color: var(--ink-soft);
      background: transparent;
    }

    .tab-button.active {
      color: var(--orange-dark);
      border-bottom-color: var(--orange-dark);
    }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(340px, 0.75fr);
      gap: 24px;
      align-items: start;
    }

    .card-header {
      padding: 22px 24px;
      border-bottom: 1px solid var(--line-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .card-title {
      font-size: 24px;
      line-height: 1.2;
      margin: 0;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .card-note {
      margin: 8px 0 0;
      color: var(--ink-soft);
      line-height: 1.45;
    }

    .card-body {
      padding: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    th,
    td {
      text-align: left;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line-soft);
      vertical-align: middle;
    }

    th {
      color: var(--ink-soft);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    tbody tr {
      cursor: pointer;
    }

    tbody tr:hover,
    tbody tr.selected {
      background: var(--surface-low);
    }

    .doc-cell,
    .agent-cell,
    .source-cell {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      min-width: 220px;
    }

    .small-icon {
      width: 34px;
      height: 34px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      background: var(--surface-low);
      border: 1px solid var(--line-soft);
      color: var(--ink-soft);
      font-weight: 600;
    }

    .small-icon.red {
      color: var(--red);
      background: var(--red-pale);
      border-color: #ffb7ad;
    }

    .small-icon.blue {
      color: var(--blue);
      background: var(--blue-pale);
    }

    .small-icon.orange {
      color: var(--orange-dark);
      background: var(--orange-pale);
      border-color: var(--line);
    }

    .file-icon {
      width: 34px;
      height: 40px;
      border-radius: 7px;
      border: 1px solid var(--line-soft);
      background: #fff;
      color: var(--blue);
      position: relative;
      display: grid;
      place-items: end center;
      padding-bottom: 6px;
      font-size: 9px;
      font-weight: 650;
      letter-spacing: 0.03em;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .file-icon:before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 11px;
      height: 11px;
      background: currentColor;
      opacity: 0.18;
      clip-path: polygon(0 0, 100% 100%, 100% 0);
    }

    .file-icon:after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 12px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 5px 0 currentColor, 0 10px 0 currentColor;
      opacity: 0.35;
    }

    .file-icon.doc {
      color: var(--blue);
      background: var(--blue-pale);
      border-color: #b4d4f2;
    }

    .file-icon.pdf {
      color: var(--red);
      background: var(--red-pale);
      border-color: #ffb7ad;
    }

    .file-icon.page {
      color: var(--ink-soft);
      background: var(--surface-low);
      border-color: var(--line-soft);
    }

    .file-icon.sheet {
      color: var(--green);
      background: var(--green-pale);
      border-color: #b9e8d3;
    }

    .file-icon.conflict {
      color: var(--red);
      background: #fff5f3;
      border-color: #ffb7ad;
    }

    .row-title {
      font-weight: 600;
      color: var(--ink);
    }

    .row-meta {
      color: var(--ink-soft);
      margin-top: 4px;
      font-size: 13px;
      line-height: 1.35;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 5px 10px;
      border-radius: 7px;
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .pill:before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: currentColor;
    }

    .pill.healthy,
    .pill.active {
      color: var(--green);
      background: var(--green-pale);
      border-color: #b9e8d3;
    }

    .pill.conflict,
    .pill.blocked {
      color: var(--red);
      background: var(--red-pale);
      border-color: #ffb7ad;
    }

    .pill.warning,
    .pill.inactive {
      color: var(--amber);
      background: var(--amber-pale);
      border-color: #f0d890;
    }

    .pill.neutral,
    .pill.connected {
      color: var(--blue);
      background: var(--blue-pale);
      border-color: #b4d4f2;
    }

    .space-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
    }

    .space-card {
      min-height: 150px;
      padding: 24px;
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease;
      position: relative;
    }

    .space-card:hover {
      transform: translateY(-2px);
      border-color: var(--line);
    }

    .space-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 30px;
    }

    .space-foot {
      border-top: 1px solid var(--line-soft);
      padding-top: 16px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
    }

    .badge-count {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: #ef4444;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 600;
      border: 3px solid var(--bg);
    }

    .agent-stack {
      display: grid;
      gap: 24px;
      align-items: start;
    }

    .rules-list {
      padding: 18px 24px 24px;
      display: grid;
      gap: 0;
    }

    .rule-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--line-soft);
    }

    .rule-row:last-child {
      border-bottom: 0;
    }

    .switch {
      width: 42px;
      height: 24px;
      border-radius: 999px;
      background: #d8dadc;
      padding: 3px;
      display: flex;
      justify-content: flex-start;
      transition: background 160ms ease;
    }

    .switch.on {
      background: var(--orange);
      justify-content: flex-end;
    }

    .switch:after {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
    }

    .notice {
      margin: 18px 24px 24px;
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--orange-pale);
      color: var(--ink-soft);
      line-height: 1.45;
    }

    .sync-card {
      display: grid;
      grid-template-columns: minmax(260px, 0.9fr) minmax(0, 1.4fr) auto;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 24px;
      padding: 0;
      overflow: hidden;
    }

    .sync-summary {
      padding: 22px 24px;
      border-right: 1px solid var(--line-soft);
      display: grid;
      gap: 14px;
      align-content: center;
    }

    .sync-summary-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .sync-rate {
      font-size: 34px;
      line-height: 1;
      font-weight: 650;
      letter-spacing: -0.03em;
    }

    .sync-metrics {
      padding: 18px 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      align-items: stretch;
    }

    .sync-metric {
      padding: 8px 22px;
      border-right: 1px solid var(--line-soft);
      display: grid;
      gap: 8px;
      align-content: center;
    }

    .sync-metric:last-child {
      border-right: 0;
    }

    .sync-metric-value {
      font-size: 22px;
      line-height: 1;
      font-weight: 600;
    }

    .sync-actions {
      padding: 22px 24px;
      border-left: 1px solid var(--line-soft);
      display: grid;
      align-content: center;
      gap: 10px;
      min-width: 170px;
    }

    .meter {
      height: 8px;
      background: var(--surface-high);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .meter span {
      display: block;
      width: 99.2%;
      height: 100%;
      background: var(--blue);
    }

    .library-controls {
      padding: 18px 20px;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto auto auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 24px;
    }

    .score-bar {
      width: 120px;
      height: 10px;
      border-radius: 999px;
      background: var(--surface-high);
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
      margin-right: 10px;
    }

    .score-bar span {
      display: block;
      height: 100%;
      background: var(--orange-dark);
    }

    .settings-layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 28px;
    }

    .settings-menu {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .settings-menu button {
      min-height: 44px;
      border: 0;
      border-radius: var(--radius);
      text-align: left;
      padding: 10px 14px;
      background: transparent;
      color: var(--ink-soft);
      font-weight: 550;
    }

    .settings-menu button.active {
      background: var(--surface-high);
      color: var(--orange-dark);
      border: 1px solid var(--line);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(25, 28, 30, 0.38);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      z-index: 10;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(840px, 100%);
      max-height: min(900px, 92vh);
      overflow: auto;
      border-radius: 14px;
      background: #fff;
      box-shadow: var(--modal-shadow);
      border: 1px solid var(--line);
    }

    .modal-head {
      padding: 22px 28px;
      border-bottom: 1px solid var(--line-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .modal-title-row {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
    }

    .modal-body {
      padding: 28px;
      display: grid;
      gap: 28px;
    }

    .close-button {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 0;
      background: transparent;
      font-size: 28px;
      line-height: 1;
      color: var(--ink-soft);
    }

    .step-block {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 16px;
    }

    .step-number {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: var(--surface-low);
      font-weight: 600;
      color: var(--ink-soft);
    }

    .step-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .field-grid {
      display: grid;
      gap: 16px;
    }

    .field label {
      display: block;
      font-weight: 550;
      margin-bottom: 8px;
      color: #351000;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid #d9e0e6;
      border-radius: var(--radius);
      min-height: 48px;
      padding: 12px 14px;
      background: #fff;
      color: var(--ink);
      resize: vertical;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .choice-button {
      border: 1px solid #d9e0e6;
      text-align: left;
      background: #fff;
      padding: 18px;
      min-height: 104px;
      display: block;
    }

    .choice-button.selected {
      border-color: var(--orange-dark);
      background: #fff8f4;
      color: #351000;
    }

    .check-list {
      display: grid;
      gap: 16px;
    }

    .check-row {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .fake-check {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: #2563eb;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 600;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .detail-box {
      border: 1px solid var(--line-soft);
      border-radius: var(--radius);
      background: var(--surface-low);
      padding: 14px;
      min-width: 0;
    }

    .detail-box code {
      display: block;
      margin-top: 6px;
      overflow-wrap: anywhere;
      color: var(--ink);
    }

    strong {
      font-weight: 600;
    }

    .modal-foot {
      padding: 18px 28px;
      border-top: 1px solid var(--line-soft);
      background: var(--bg);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .success-panel {
      padding: 28px;
      display: grid;
      gap: 18px;
    }

    .success-callout {
      border: 1px solid #b9e8d3;
      background: var(--green-pale);
      border-radius: var(--radius);
      padding: 18px;
      line-height: 1.5;
    }

    code,
    pre {
      font-family: var(--mono);
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      background: #15191c;
      color: #edf6f3;
      padding: 16px;
      border-radius: var(--radius);
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.5;
    }

    .empty {
      padding: 28px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink-soft);
      line-height: 1.5;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *:before, *:after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }

    @media (max-width: 1120px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .mobile-nav {
        display: flex;
      }

      .topbar {
        padding: 14px 18px;
      }

      .content {
        padding: 24px 18px;
      }

      .split,
      .settings-layout {
        grid-template-columns: 1fr;
      }

      .stats,
      .space-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        max-width: 100vw;
      }

      .search {
        width: 100%;
      }

      .top-actions {
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
      }

      .page-head {
        align-items: stretch;
        flex-direction: column;
        width: 100%;
        max-width: 100%;
      }

      h1 {
        font-size: 32px;
      }

      .stats,
      .sync-card,
      .library-controls,
      .detail-grid,
      .choice-grid {
        grid-template-columns: 1fr;
      }

      .sync-summary,
      .sync-actions {
        border: 0;
      }

      .sync-metrics {
        grid-template-columns: 1fr;
        padding: 0 18px 18px;
      }

      .sync-metric {
        border-right: 0;
        border-top: 1px solid var(--line-soft);
        padding: 16px 6px;
      }

      .stat-card,
      .modal-title-row,
      .step-block {
        grid-template-columns: 1fr;
      }

      .modal-body,
      .modal-head,
      .modal-foot {
        padding-left: 18px;
        padding-right: 18px;
      }

      .modal-foot {
        flex-direction: column-reverse;
      }

      .modal-foot button,
      .page-head button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <div class="brand-row">
          <span class="logo-mark" aria-hidden="true"></span>
          <span class="brand-name">capsa</span>
        </div>
        <div class="brand-caption">Trusted, organized</div>
      </div>
      <nav class="nav" id="sideNav" aria-label="Primary navigation"></nav>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <label class="search" aria-label="Search">
          <span class="glyph">?</span>
          <input id="searchInput" type="search" placeholder="Search across spaces...">
        </label>
        <div class="top-actions">
          <button class="notification-button" type="button" aria-label="Notifications">
            <span class="glyph" aria-hidden="true">!</span>
            <span class="notification-dot" aria-hidden="true"></span>
          </button>
          <button class="profile-button" type="button" aria-label="Profile">N</button>
        </div>
      </header>
      <nav class="mobile-nav" id="mobileNav" aria-label="Mobile navigation"></nav>
      <main class="content" id="content"></main>
    </section>
  </div>

  <div class="modal-backdrop" id="shareModal" role="dialog" aria-modal="true" aria-labelledby="shareTitle">
    <div class="modal">
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const navItems = [
      { id: "spaces", label: "Spaces", icon: "#" },
      { id: "sources", label: "Sources", icon: "=" },
      { id: "library", label: "Library", icon: "L" },
      { id: "settings", label: "Settings", icon: "*" }
    ];

    const state = {
      view: "spaces",
      activeTab: "inventory",
      selectedSpaceId: "operations",
      modalOpen: false,
      modalType: "share",
      modalStep: "form",
      sourceStep: "form",
      spaceStep: "form",
      selectedPermission: "Read-only",
      createdAgent: false,
      newAgentName: "Refund Support Agent",
      newAgentPurpose: "Answers refund and escalation questions from approved support documents.",
      copiedCredentials: false,
      selectedSource: "Google Drive",
      sourceFolder: "Operations Refund Policies",
      connectedSources: [],
      selectedAgentName: "Customer Support Bot",
      newSpaceName: "Finance",
      newSpacePurpose: "Policies, reports, and approved working documents.",
      createdSpaces: []
    };

    const sourceChoices = ["Google Drive", "SharePoint", "Notion", "Slack"];

    const spaces = [
      { id: "marketing", name: "Marketing", docs: "1.2k", status: "Healthy", statusClass: "healthy", icon: "M" },
      { id: "operations", name: "Operations", docs: "850", status: "2 Conflicts", statusClass: "conflict", icon: "O" },
      { id: "support", name: "Support", docs: "640", status: "Healthy", statusClass: "healthy", icon: "S" },
      { id: "engineering", name: "Engineering", docs: "3.4k", status: "1 Warning", statusClass: "warning", icon: "E" }
    ];

    const documents = [
      { title: "Enterprise Refund Policy (Draft)", source: "Google Drive", type: "Doc", updated: "2 hours ago", status: "Conflict", statusClass: "conflict" },
      { title: "Internal Support Playbook 2023", source: "SharePoint", type: "PDF", updated: "Oct 12, 2023", status: "Healthy", statusClass: "healthy" },
      { title: "Q3 Marketing Assets Review", source: "Notion", type: "Page", updated: "Yesterday", status: "Healthy", statusClass: "healthy" },
      { title: "Vendor Contact List 2024", source: "Google Drive", type: "Sheet", updated: "Oct 10, 2023", status: "Archived", statusClass: "neutral" }
    ];

    const baseAgents = [
      { name: "Customer Support Bot", query: "5 mins ago", permission: "Read-only", status: "Active", docs: "848 Docs / 2 Blocked", icon: "B", active: true },
      { name: "Legal Analysis Agent", query: "2 hours ago", permission: "Read/Write", status: "Active", docs: "850 Docs / 0 Blocked", icon: "A", active: true },
      { name: "Marketing Insights Engine", query: "3 days ago", permission: "Read-only", status: "Inactive", docs: "0 Docs / 0 Blocked", icon: "I", active: false }
    ];

    const sources = [
      { platform: "Google Workspace", detail: "Drive and Docs", status: "Connected", metric: "12,405 Docs", sync: "2m ago", icon: "G", error: false },
      { platform: "Slack", detail: "Public Channels", status: "Connected", metric: "1.2M Messages", sync: "Just now", icon: "S", error: false },
      { platform: "Notion", detail: "Engineering Wiki", status: "Connected", metric: "3,892 Pages", sync: "1h ago", icon: "N", error: false },
      { platform: "SharePoint", detail: "Legacy Archive", status: "Auth Error", metric: "45,100 Files", sync: "2 days ago", icon: "P", error: true }
    ];

    const libraryDocs = [
      { title: "Q3 Financial Disclosures 2023", id: "DOC-8924-A", type: "Financial Report", space: "Corporate Compliance", source: "SharePoint", score: 98, updated: "Today, 10:42 AM", icon: "P" },
      { title: "Employee Handbook v4.2", id: "HR-MNL-22", type: "Policy", space: "Human Resources", source: "Google Drive", score: 100, updated: "Oct 12, 2023", icon: "D" },
      { title: "European Server Logs - Sept", id: "LOG-EU-09", type: "Raw Data", space: "Infrastructure", source: "AWS S3", score: 65, updated: "Sep 30, 2023", icon: "R" }
    ];

    const content = document.getElementById("content");
    const sideNav = document.getElementById("sideNav");
    const mobileNav = document.getElementById("mobileNav");
    const shareModal = document.getElementById("shareModal");
    const modalContent = document.getElementById("modalContent");

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function navActive(id) {
      if (id === "spaces") return state.view === "spaces" || state.view === "spaceDetail";
      return state.view === id;
    }

    function renderNav() {
      sideNav.innerHTML = navItems.map((item) => `
        <button class="nav-button ${navActive(item.id) ? "active" : ""}" type="button" data-nav="${item.id}">
          <span class="glyph">${item.icon}</span>
          <span>${item.label}</span>
        </button>
      `).join("");

      mobileNav.innerHTML = navItems.map((item) => `
        <button class="top-nav-button ${navActive(item.id) ? "active" : ""}" type="button" data-nav="${item.id}">
          ${item.label}
        </button>
      `).join("");

      document.querySelectorAll("[data-nav]").forEach((button) => {
        button.addEventListener("click", () => {
          state.view = button.dataset.nav;
          render();
        });
      });
    }

    function getSpaces() {
      return [...spaces, ...state.createdSpaces];
    }

    function getCurrentSpace() {
      return getSpaces().find((space) => space.id === state.selectedSpaceId) || getSpaces()[0];
    }

    function pill(label, className) {
      return `<span class="pill ${className || "neutral"}">${label}</span>`;
    }

    function documentIcon(doc) {
      const type = doc.type.toLowerCase();
      const iconClass = doc.statusClass === "conflict" ? "conflict" : type;
      const label = type === "doc" ? "DOC" : type === "pdf" ? "PDF" : type === "page" ? "PG" : "XLS";
      return `<span class="file-icon ${iconClass}" aria-label="${escapeHtml(doc.type)} file">${label}</span>`;
    }

    function pageHead(title, subtitle, action) {
      return `
        <section class="page-head">
          <div>
            ${state.view === "spaceDetail" ? `<div class="crumbs"><span>Spaces</span><span>/</span><span>${escapeHtml(getCurrentSpace().name)}</span></div>` : ""}
            <h1>${title}</h1>
            ${subtitle ? `<p class="subcopy">${subtitle}</p>` : ""}
          </div>
          ${action || ""}
        </section>
      `;
    }

    function stats() {
      return `
        <section class="stats">
          <article class="stat-card">
            <div class="stat-icon">D</div>
            <div><div class="label">Total documents</div><div class="stat-value">850</div></div>
          </article>
          <article class="stat-card alert">
            <div class="stat-icon">!</div>
            <div><div class="label">Active conflicts</div><div class="stat-value">2</div></div>
          </article>
          <article class="stat-card source">
            <div class="stat-icon">S</div>
            <div><div class="label">Connected sources</div><div class="stat-value">15</div></div>
          </article>
        </section>
      `;
    }

    function spacesOverview() {
      const allSpaces = getSpaces();
      return `
        ${pageHead("Organization Spaces", "Spaces are controlled document pools that agents can safely read from.", '<button class="primary-button" type="button" id="addSpaceButton"><span>+</span>Add Space</button>')}
        <section class="space-grid">
          ${allSpaces.map((space) => `
            <article class="space-card" data-space="${space.id}" tabindex="0">
              ${space.badge ? `<div class="badge-count">${space.badge}</div>` : ""}
              <div class="space-title"><span class="small-icon ${space.statusClass === "conflict" ? "red" : "blue"}">${space.icon}</span>${space.name}</div>
              <div class="space-foot">
                <div><div class="label">Volume</div><div style="font-size: 22px; font-weight: 650">${space.docs} docs</div></div>
                ${pill(space.status, space.statusClass)}
              </div>
            </article>
          `).join("")}
        </section>
      `;
    }

    function operationsView() {
      const space = getCurrentSpace();
      return `
        ${pageHead(`${escapeHtml(space.name)} Space`, "", '<button class="primary-button" type="button" id="addSourceButton"><span>+</span>Add Source</button>')}
        ${stats()}
        <div class="tabs">
          <button class="tab-button ${state.activeTab === "inventory" ? "active" : ""}" type="button" data-tab="inventory">Document Inventory</button>
          <button class="tab-button ${state.activeTab === "agents" ? "active" : ""}" type="button" data-tab="agents">Agent Connections</button>
        </div>
        ${state.activeTab === "inventory" ? inventoryPanel() : agentConnectionsPanel()}
      `;
    }

    function inventoryPanel() {
      return `
        <section class="card">
          <div class="card-header">
            <div>
              <h2 class="card-title">Document Inventory</h2>
              <p class="card-note">Review documents included in this Space.</p>
            </div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap">
              <button class="ghost-button icon-control" type="button"><span class="control-icon filter" aria-hidden="true"></span>All Types</button>
              <button class="ghost-button icon-control" type="button"><span class="control-icon sort" aria-hidden="true"></span>Sort</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Document Name</th><th>Source</th><th>Type</th><th>Last Updated</th><th>Status</th></tr></thead>
              <tbody>
                ${documents.map((doc, index) => `
                  <tr class="${index === 0 ? "selected" : ""}" tabindex="0">
                    <td><div class="doc-cell">${documentIcon(doc)}<span class="row-title">${doc.title}</span></div></td>
                    <td>${doc.source}</td><td>${doc.type}</td><td>${doc.updated}</td><td>${pill(doc.status, doc.statusClass)}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
          <div class="card-header" style="border-bottom: 0"><span class="row-meta">Showing 1 to 4 of 850 documents</span><span class="row-meta">Prev / Next</span></div>
        </section>
      `;
    }

    function getAgents() {
      if (!state.createdAgent) return baseAgents;
      const exists = baseAgents.some((agent) => agent.name === state.newAgentName);
      if (exists) return baseAgents;
      return [
        { name: state.newAgentName, query: "Just now", permission: state.selectedPermission, status: "Active", docs: "848 Docs / 2 Blocked", icon: "B", active: true },
        ...baseAgents
      ];
    }

    function getSelectedAgent() {
      return getAgents().find((agent) => agent.name === state.selectedAgentName) || getAgents()[0];
    }

    function getSources() {
      return [...state.connectedSources, ...sources];
    }

    function agentConnectionsPanel() {
      const agents = getAgents();
      return `
        <section class="agent-stack">
          <article class="card">
            <div class="card-header">
              <div>
                <h2 class="card-title">Agent Connections</h2>
                <p class="card-note">Allowed agents can read this Space without seeing quarantined documents.</p>
              </div>
              <button class="primary-button" type="button" id="shareSpaceButton">Share Space</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Agent Identity</th><th>Permission</th><th>Status</th><th>Access</th><th>Actions</th></tr></thead>
                <tbody>
                  ${agents.map((agent) => `
                    <tr tabindex="0">
                      <td><div class="agent-cell"><span class="small-icon orange">${agent.icon}</span><div><div class="row-title">${agent.name}</div><div class="row-meta">Last query: ${agent.query}</div></div></div></td>
                      <td>${pill(agent.permission, "neutral")}</td>
                      <td>${pill(agent.status, agent.active ? "active" : "inactive")}</td>
                      <td>${agent.docs}</td>
                      <td><button class="top-nav-button" type="button" data-agent-manage="${escapeHtml(agent.name)}">Manage</button></td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
            <div class="card-header" style="border-bottom: 0"><span class="row-meta">Showing ${agents.length} active connections</span></div>
          </article>
          <article class="card">
            <div class="card-header">
              <div>
                <h2 class="card-title">Safety Rules</h2>
                <p class="card-note">Rules enforced for every allowed agent.</p>
              </div>
            </div>
            <div class="rules-list">
              ${ruleRow("Only healthy documents returned", "Agents receive approved documents only.", true)}
              ${ruleRow("Quarantined documents blocked", "Conflicting or stale documents are hidden.", true)}
              ${ruleRow("Log all queries", "Keep a simple audit trail.", true)}
              ${ruleRow("Hide needs-review documents", "Exclude uncertain documents.", false)}
            </div>
            <div class="notice">Recent event: 1 quarantine event blocked 2 documents from agent access.</div>
          </article>
        </section>
      `;
    }

    function ruleRow(title, copy, enabled) {
      return `
        <div class="rule-row">
          <div><div class="row-title">${title}</div><div class="row-meta">${copy}</div></div>
          <span class="switch ${enabled ? "on" : ""}" aria-hidden="true"></span>
        </div>
      `;
    }

    function sourcesView() {
      const allSources = getSources();
      return `
        ${pageHead("Data Sources", "Manage connected platforms, monitor sync health, and configure document intake.", '<button class="primary-button" type="button" id="addSourceButton"><span>+</span>Add Source</button>')}
        <section class="card sync-card">
          <div class="sync-summary">
            <div class="sync-summary-head">
              <div>
                <h2 class="card-title">Sync Health</h2>
                <p class="card-note">All connected sources in the last 24 hours.</p>
              </div>
              ${pill("Healthy", "healthy")}
            </div>
            <div>
              <div style="display: flex; justify-content: space-between; gap: 12px; align-items: end"><span class="label">Success rate</span><span class="sync-rate">99.2%</span></div>
              <div class="meter"><span></span></div>
            </div>
          </div>
          <div class="sync-metrics">
            <div class="sync-metric"><div class="label">Active sources</div><div class="sync-metric-value">4</div><div class="row-meta">Syncing normally</div></div>
            <div class="sync-metric"><div class="label">Documents checked</div><div class="sync-metric-value">18.7k</div><div class="row-meta">2 quarantined</div></div>
            <div class="sync-metric"><div class="label">Needs attention</div><div class="sync-metric-value" style="color: var(--red)">1</div><div class="row-meta">SharePoint auth</div></div>
          </div>
          <div class="sync-actions">
            <button class="secondary-button" type="button">Run sync check</button>
            <span class="row-meta">Last check: 2m ago</span>
          </div>
        </section>
        <section class="card">
          <div class="table-wrap">
            <table>
              <thead><tr><th>Platform</th><th>Status</th><th>Metrics</th><th>Last Sync</th><th>Actions</th></tr></thead>
              <tbody>
                ${allSources.map((source) => `
                  <tr tabindex="0">
                    <td><div class="source-cell"><span class="small-icon ${source.error ? "red" : "blue"}">${source.icon}</span><div><div class="row-title">${source.platform}</div><div class="row-meta">${source.detail}</div></div></div></td>
                    <td>${pill(source.status, source.error ? "conflict" : "connected")}</td>
                    <td>${source.metric}</td>
                    <td style="${source.error ? "color: var(--red)" : ""}">${source.sync}</td>
                    <td><button class="top-nav-button" type="button">Manage</button></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function libraryView() {
      return `
        ${pageHead("Knowledge Library", "Central place for verified documents and source records.")}
        <section class="card library-controls">
          <label class="search" style="width: 100%"><span class="glyph">?</span><input type="search" placeholder="Search all verified documents..."></label>
          <button class="ghost-button" type="button">Type</button>
          <button class="ghost-button" type="button">Source</button>
          <button class="ghost-button" type="button">More Filters</button>
        </section>
        <section class="card">
          <div class="table-wrap">
            <table>
              <thead><tr><th>Document Name</th><th>Type</th><th>Space / Source</th><th>Trust Score</th><th>Updated</th></tr></thead>
              <tbody>
                ${libraryDocs.map((doc) => `
                  <tr tabindex="0">
                    <td><div class="doc-cell"><span class="small-icon blue">${doc.icon}</span><div><div class="row-title">${doc.title}</div><div class="row-meta">ID: ${doc.id}</div></div></div></td>
                    <td>${pill(doc.type, "neutral")}</td>
                    <td><div>${doc.space}</div><div class="row-meta">${doc.source}</div></td>
                    <td><span class="score-bar"><span style="width:${doc.score}%"></span></span><strong>${doc.score}%</strong></td>
                    <td>${doc.updated}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
          <div class="card-header" style="border-bottom: 0"><span class="row-meta">Showing 1 to 3 of 2,491 documents</span></div>
        </section>
      `;
    }

    function settingsView() {
      return `
        ${pageHead("Settings", "Manage platform preferences and safety rules.")}
        <section class="settings-layout">
          <div class="settings-menu">
            <button type="button">Profile</button>
            <button type="button">Organization</button>
            <button type="button" class="active">Security and rules</button>
            <button type="button">Integrations</button>
            <button type="button">Notifications</button>
          </div>
          <div class="stack" style="display: grid; gap: 24px">
            <article class="card">
              <div class="card-header"><div><h2 class="card-title">AI Processing Guardrails</h2><p class="card-note">Simple protections applied before documents are used by agents.</p></div></div>
              <div class="rules-list">
                ${ruleRow("PII redaction", "Mask personal information before it reaches external tools.", false)}
                ${ruleRow("Answer checking", "Compare generated answers against trusted documents.", false)}
                ${ruleRow("Formal tone", "Keep agent answers clear and professional.", true)}
              </div>
            </article>
            <article class="card">
              <div class="card-header"><div><h2 class="card-title">Access Security</h2><p class="card-note">Control sign-in and session settings.</p></div></div>
              <div class="rules-list">
                ${ruleRow("Require multi-factor login", "Required for admins.", false)}
                <div class="rule-row"><div><div class="row-title">Idle session timeout</div><div class="row-meta">30 minutes</div></div><button class="ghost-button" type="button">Change</button></div>
              </div>
            </article>
          </div>
        </section>
      `;
    }

    function render() {
      renderNav();
      if (state.view === "spaceDetail") content.innerHTML = operationsView();
      if (state.view === "spaces") content.innerHTML = spacesOverview();
      if (state.view === "sources") content.innerHTML = sourcesView();
      if (state.view === "library") content.innerHTML = libraryView();
      if (state.view === "settings") content.innerHTML = settingsView();
      bindPage();
      renderModal();
    }

    function bindPage() {
      document.querySelectorAll("[data-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeTab = button.dataset.tab;
          render();
        });
      });

      document.querySelectorAll("[data-space]").forEach((card) => {
        const open = () => {
          state.selectedSpaceId = card.dataset.space;
          state.view = "spaceDetail";
          render();
        };
        card.addEventListener("click", open);
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            open();
          }
        });
      });

      const shareButton = document.getElementById("shareSpaceButton");
      if (shareButton) {
        shareButton.addEventListener("click", () => {
          state.modalOpen = true;
          state.modalType = "share";
          state.modalStep = "form";
          state.copiedCredentials = false;
          renderModal();
        });
      }

      const addButton = document.getElementById("addSourceButton");
      if (addButton) {
        addButton.addEventListener("click", () => {
          state.modalOpen = true;
          state.modalType = "source";
          state.sourceStep = "form";
          renderModal();
        });
      }

      const addSpaceButton = document.getElementById("addSpaceButton");
      if (addSpaceButton) {
        addSpaceButton.addEventListener("click", () => {
          state.modalOpen = true;
          state.modalType = "space";
          state.spaceStep = "form";
          renderModal();
        });
      }

      document.querySelectorAll("[data-agent-manage]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedAgentName = button.dataset.agentManage;
          state.modalOpen = true;
          state.modalType = "manageAgent";
          renderModal();
        });
      });
    }

    function renderModal() {
      shareModal.classList.toggle("open", state.modalOpen);
      if (!state.modalOpen) {
        modalContent.innerHTML = "";
        return;
      }
      if (state.modalType === "source") {
        modalContent.innerHTML = state.sourceStep === "success" ? sourceSuccessModal() : sourceFormModal();
      } else if (state.modalType === "manageAgent") {
        modalContent.innerHTML = manageAgentModal();
      } else if (state.modalType === "space") {
        modalContent.innerHTML = state.spaceStep === "success" ? spaceSuccessModal() : spaceFormModal();
      } else {
        modalContent.innerHTML = state.modalStep === "success" ? shareSuccessModal() : shareFormModal();
      }
      bindModal();
    }

    function shareFormModal() {
      return `
        <div class="modal-head">
          <div class="modal-title-row">
            <span class="small-icon orange">S</span>
            <div><h2 class="card-title" id="shareTitle">Share Space with agent</h2><p class="card-note">Create an allowed agent for Operations.</p></div>
          </div>
          <button class="close-button" type="button" data-close aria-label="Close">x</button>
        </div>
        <div class="modal-body">
          <section class="step-block">
            <div class="step-number">1</div>
            <div>
              <div class="step-title">Agent identity</div>
              <div class="field-grid">
                <div class="field"><label for="agentName">Agent name</label><input id="agentName" value="${escapeHtml(state.newAgentName)}"></div>
                <div class="field"><label for="agentPurpose">Purpose</label><textarea id="agentPurpose" rows="3">${escapeHtml(state.newAgentPurpose)}</textarea></div>
              </div>
            </div>
          </section>
          <section class="step-block">
            <div class="step-number">2</div>
            <div>
              <div class="step-title">Permission</div>
              <div class="choice-grid">
                <button class="choice-button ${state.selectedPermission === "Read-only" ? "selected" : ""}" type="button" data-permission="Read-only"><strong>Read-only</strong><br><span class="row-meta">Agent can search documents but cannot add or change them.</span></button>
                <button class="choice-button ${state.selectedPermission === "Read/Write" ? "selected" : ""}" type="button" data-permission="Read/Write"><strong>Read/Write</strong><br><span class="row-meta">Agent can search and add new processed documents.</span></button>
              </div>
            </div>
          </section>
          <section class="step-block">
            <div class="step-number">3</div>
            <div>
              <div class="step-title">Safety rules</div>
              <div class="check-list">
                ${checkRow("Only return healthy documents", "Exclude flagged or stale documents from answers.")}
                ${checkRow("Block quarantined documents", "Deny access to documents marked for review.")}
                ${checkRow("Log all queries", "Keep an audit trail of every question sent to this Space.")}
              </div>
            </div>
          </section>
        </div>
        <div class="modal-foot">
          <button class="secondary-button" type="button" data-close>Cancel</button>
          <button class="primary-button" type="button" id="createConnectionButton">Create connection</button>
        </div>
      `;
    }

    function checkRow(title, copy) {
      return `<div class="check-row"><span class="fake-check">ok</span><div><div class="row-title">${title}</div><div class="row-meta">${copy}</div></div></div>`;
    }

    function credentialText() {
      return JSON.stringify({
        name: state.newAgentName,
        type: "mcp",
        space: "operations",
        access: state.selectedPermission,
        visibility: "healthy_documents_only",
        api_key: "capsa_live_sk_9f3...operations",
        endpoint: "https://api.capsa.local/spaces/operations/search"
      }, null, 2);
    }

    function shareSuccessModal() {
      const safeName = escapeHtml(state.newAgentName);
      const safePermission = escapeHtml(state.selectedPermission);
      const credentials = escapeHtml(credentialText());
      return `
        <div class="modal-head">
          <div class="modal-title-row">
            <span class="small-icon orange">OK</span>
            <div><h2 class="card-title" id="shareTitle">Agent credentials ready</h2><p class="card-note">${safeName} can now connect to Operations.</p></div>
          </div>
          <button class="close-button" type="button" data-close aria-label="Close">x</button>
        </div>
        <div class="success-panel">
          <div class="success-callout"><strong>${safeName}</strong> has ${safePermission.toLowerCase()} access. Healthy documents are returned. Quarantined documents stay hidden.</div>
          <div class="detail-grid">
            <div class="detail-box"><div class="label">Agent</div><code>${safeName}</code></div>
            <div class="detail-box"><div class="label">Space</div><code>Operations</code></div>
            <div class="detail-box"><div class="label">Access</div><code>${safePermission}</code></div>
            <div class="detail-box"><div class="label">Visibility</div><code>Healthy documents only</code></div>
            <div class="detail-box"><div class="label">API key</div><code>capsa_live_sk_9f3...operations</code></div>
            <div class="detail-box"><div class="label">Space endpoint</div><code>https://api.capsa.local/spaces/operations/search</code></div>
          </div>
          <pre>${credentials}</pre>
        </div>
        <div class="modal-foot">
          <button class="secondary-button" type="button" id="copyCredentialsButton">${state.copiedCredentials ? "Copied" : "Copy credentials"}</button>
          <button class="primary-button" type="button" data-close>Done</button>
        </div>
      `;
    }

    function sourceFormModal() {
      return `
        <div class="modal-head">
          <div class="modal-title-row">
            <span class="small-icon orange">+</span>
            <div><h2 class="card-title" id="shareTitle">Add Source</h2><p class="card-note">Connect a document source to Operations Space.</p></div>
          </div>
          <button class="close-button" type="button" data-close aria-label="Close">x</button>
        </div>
        <div class="modal-body">
          <section class="step-block">
            <div class="step-number">1</div>
            <div>
              <div class="step-title">Source</div>
              <div class="choice-grid">
                ${sourceChoices.map((source) => `
                  <button class="choice-button ${state.selectedSource === source ? "selected" : ""}" type="button" data-source-choice="${source}">
                    <strong>${source}</strong><br><span class="row-meta">Bring approved documents into Operations Space.</span>
                  </button>
                `).join("")}
              </div>
            </div>
          </section>
          <section class="step-block">
            <div class="step-number">2</div>
            <div>
              <div class="step-title">Destination</div>
              <div class="field-grid">
                <div class="field"><label for="sourceFolder">Folder or library name</label><input id="sourceFolder" value="${escapeHtml(state.sourceFolder)}"></div>
                <div class="detail-box"><div class="label">Space destination</div><code>Operations Space</code></div>
              </div>
            </div>
          </section>
          <section class="step-block">
            <div class="step-number">3</div>
            <div>
              <div class="step-title">Safety defaults</div>
              <div class="check-list">
                ${checkRow("Scan for conflicts", "Find mismatched policy claims before documents are shared.")}
                ${checkRow("Quarantine risky documents", "Block documents that need review.")}
              </div>
            </div>
          </section>
        </div>
        <div class="modal-foot">
          <button class="secondary-button" type="button" data-close>Cancel</button>
          <button class="primary-button" type="button" id="connectSourceButton">Connect source</button>
        </div>
      `;
    }

    function sourceSuccessModal() {
      const safeSource = escapeHtml(state.selectedSource);
      const safeFolder = escapeHtml(state.sourceFolder);
      return `
        <div class="modal-head">
          <div class="modal-title-row">
            <span class="small-icon orange">OK</span>
            <div><h2 class="card-title" id="shareTitle">Source connected</h2><p class="card-note">${safeSource} is now connected to Operations Space.</p></div>
          </div>
          <button class="close-button" type="button" data-close aria-label="Close">x</button>
        </div>
        <div class="success-panel">
          <div class="success-callout"><strong>${safeSource}</strong> will sync documents from <strong>${safeFolder}</strong>. Capsa will scan for conflicts and quarantine risky documents before agents can read them.</div>
          <div class="detail-grid">
            <div class="detail-box"><div class="label">Source</div><code>${safeSource}</code></div>
            <div class="detail-box"><div class="label">Folder/library</div><code>${safeFolder}</code></div>
            <div class="detail-box"><div class="label">Destination</div><code>Operations Space</code></div>
            <div class="detail-box"><div class="label">Status</div><code>Connected</code></div>
          </div>
        </div>
        <div class="modal-foot">
          <button class="primary-button" type="button" data-close>Done</button>
        </div>
      `;
    }

    function spaceFormModal() {
      return `
        <div class="modal-head">
          <div class="modal-title-row">
            <span class="small-icon orange">+</span>
            <div><h2 class="card-title" id="shareTitle">Add Space</h2><p class="card-note">Create a new controlled document pool.</p></div>
          </div>
          <button class="close-button" type="button" data-close aria-label="Close">x</button>
        </div>
        <div class="modal-body">
          <section class="step-block">
            <div class="step-number">1</div>
            <div>
              <div class="step-title">Space details</div>
              <div class="field-grid">
                <div class="field"><label for="spaceName">Space name</label><input id="spaceName" value="${escapeHtml(state.newSpaceName)}"></div>
                <div class="field"><label for="spacePurpose">Purpose</label><textarea id="spacePurpose" rows="3">${escapeHtml(state.newSpacePurpose)}</textarea></div>
              </div>
            </div>
          </section>
          <section class="step-block">
            <div class="step-number">2</div>
            <div>
              <div class="step-title">Defaults</div>
              <div class="check-list">
                ${checkRow("Healthy documents only", "Agents only see documents that pass review.")}
                ${checkRow("Scan new sources", "New documents are checked for conflicts.")}
                ${checkRow("Quarantine risky documents", "Blocked documents stay out of agent answers.")}
              </div>
            </div>
          </section>
        </div>
        <div class="modal-foot">
          <button class="secondary-button" type="button" data-close>Cancel</button>
          <button class="primary-button" type="button" id="createSpaceButton">Create Space</button>
        </div>
      `;
    }

    function spaceSuccessModal() {
      const safeName = escapeHtml(state.newSpaceName);
      return `
        <div class="modal-head">
          <div class="modal-title-row">
            <span class="small-icon orange">OK</span>
            <div><h2 class="card-title" id="shareTitle">Space created</h2><p class="card-note">${safeName} is ready for sources and allowed agents.</p></div>
          </div>
          <button class="close-button" type="button" data-close aria-label="Close">x</button>
        </div>
        <div class="success-panel">
          <div class="success-callout"><strong>${safeName}</strong> now appears in Spaces. It starts with healthy-docs-only sharing and quarantine protection turned on.</div>
          <div class="detail-grid">
            <div class="detail-box"><div class="label">Space</div><code>${safeName}</code></div>
            <div class="detail-box"><div class="label">Status</div><code>Healthy</code></div>
            <div class="detail-box"><div class="label">Documents</div><code>0 docs</code></div>
            <div class="detail-box"><div class="label">Agents</div><code>No agents yet</code></div>
          </div>
        </div>
        <div class="modal-foot">
          <button class="primary-button" type="button" data-close>Done</button>
        </div>
      `;
    }

    function manageAgentModal() {
      const agent = getSelectedAgent();
      const safeName = escapeHtml(agent.name);
      const safePermission = escapeHtml(agent.permission);
      const safeStatus = escapeHtml(agent.status);
      const safeDocs = escapeHtml(agent.docs);
      const safeQuery = escapeHtml(agent.query);
      const endpoint = "https://api.capsa.local/spaces/operations/search";
      return `
        <div class="modal-head">
          <div class="modal-title-row">
            <span class="small-icon orange">${escapeHtml(agent.icon)}</span>
            <div><h2 class="card-title" id="shareTitle">Manage agent</h2><p class="card-note">${safeName} access for Operations Space.</p></div>
          </div>
          <button class="close-button" type="button" data-close aria-label="Close">x</button>
        </div>
        <div class="modal-body">
          <section>
            <div class="step-title">Connection</div>
            <div class="detail-grid">
              <div class="detail-box"><div class="label">Agent</div><code>${safeName}</code></div>
              <div class="detail-box"><div class="label">Status</div><code>${safeStatus}</code></div>
              <div class="detail-box"><div class="label">Permission</div><code>${safePermission}</code></div>
              <div class="detail-box"><div class="label">Visible access</div><code>${safeDocs}</code></div>
              <div class="detail-box"><div class="label">API key</div><code>capsa_live_sk_9f3...operations</code></div>
              <div class="detail-box"><div class="label">Endpoint</div><code>${endpoint}</code></div>
            </div>
          </section>
          <section>
            <div class="step-title">Safety rules</div>
            <div class="check-list">
              ${checkRow("Healthy documents only", "This agent cannot see quarantined documents.")}
              ${checkRow("Log every query", "Questions and source documents are recorded.")}
              ${checkRow("Block policy conflicts", "Conflicting documents stay hidden until reviewed.")}
            </div>
          </section>
          <section>
            <div class="step-title">Recent activity</div>
            <div class="detail-grid">
              <div class="detail-box"><div class="label">Last query</div><code>${safeQuery}</code></div>
              <div class="detail-box"><div class="label">Last answer source</div><code>Internal Support Playbook 2023</code></div>
              <div class="detail-box"><div class="label">Blocked documents</div><code>2 quarantined documents</code></div>
              <div class="detail-box"><div class="label">Audit status</div><code>Logging enabled</code></div>
            </div>
          </section>
        </div>
        <div class="modal-foot">
          <button class="secondary-button" type="button" id="rotateAgentKeyButton">Rotate key</button>
          <button class="secondary-button" type="button" data-close>Close</button>
          <button class="primary-button" type="button" data-close>Save changes</button>
        </div>
      `;
    }

    function bindModal() {
      document.querySelectorAll("[data-close]").forEach((button) => {
        button.addEventListener("click", () => {
          state.modalOpen = false;
          render();
        });
      });

      document.querySelectorAll("[data-permission]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedPermission = button.dataset.permission;
          renderModal();
        });
      });

      document.querySelectorAll("[data-source-choice]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedSource = button.dataset.sourceChoice;
          state.sourceFolder = `${state.selectedSource} Operations Library`;
          renderModal();
        });
      });

      const connect = document.getElementById("connectSourceButton");
      if (connect) {
        connect.addEventListener("click", () => {
          const folderInput = document.getElementById("sourceFolder");
          state.sourceFolder = folderInput.value.trim() || `${state.selectedSource} Operations Library`;
          state.connectedSources.unshift({
            platform: state.selectedSource,
            detail: state.sourceFolder,
            status: "Connected",
            metric: "New source",
            sync: "Just now",
            icon: state.selectedSource.charAt(0),
            error: false
          });
          state.view = "sources";
          state.sourceStep = "success";
          render();
        });
      }

      const create = document.getElementById("createConnectionButton");
      if (create) {
        create.addEventListener("click", () => {
          const nameInput = document.getElementById("agentName");
          const purposeInput = document.getElementById("agentPurpose");
          state.newAgentName = nameInput.value.trim() || "Customer Support Bot";
          state.newAgentPurpose = purposeInput.value.trim() || "Answers questions from approved documents.";
          state.createdAgent = true;
          state.modalStep = "success";
          state.activeTab = "agents";
          state.copiedCredentials = false;
          renderModal();
        });
      }

      const createSpace = document.getElementById("createSpaceButton");
      if (createSpace) {
        createSpace.addEventListener("click", () => {
          const nameInput = document.getElementById("spaceName");
          const purposeInput = document.getElementById("spacePurpose");
          state.newSpaceName = nameInput.value.trim() || "Finance";
          state.newSpacePurpose = purposeInput.value.trim() || "Policies, reports, and approved working documents.";
          const id = state.newSpaceName.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "new-space";
          const exists = getSpaces().some((space) => space.id === id);
          if (!exists) {
            state.createdSpaces.push({
              id,
              name: state.newSpaceName,
              docs: "0",
              status: "Healthy",
              statusClass: "healthy",
              icon: state.newSpaceName.charAt(0).toUpperCase()
            });
          }
          state.selectedSpaceId = id;
          state.spaceStep = "success";
          renderModal();
        });
      }

      const copy = document.getElementById("copyCredentialsButton");
      if (copy) {
        copy.addEventListener("click", () => {
          state.copiedCredentials = true;
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(credentialText()).catch(() => {});
          }
          renderModal();
        });
      }

      const rotate = document.getElementById("rotateAgentKeyButton");
      if (rotate) {
        rotate.addEventListener("click", () => {
          rotate.textContent = "Key rotated";
        });
      }

      shareModal.addEventListener("click", (event) => {
        if (event.target === shareModal) {
          state.modalOpen = false;
          render();
        }
      }, { once: true });
    }

    render();
  </script>
</body>
</html>
